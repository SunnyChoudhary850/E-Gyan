<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EGyan — Learning Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#f9f7f4;
            --surface:#ffffff;
            --border:#e8e4df;
            --text:#1a1714;
            --muted:#7a7470;
            --accent:#2d6a4f;
            --accent-light:#e8f5ee;
            --accent-dark:#1b4332;
            --danger:#c0392b;
            --warn:#e67e22;
            --radius:10px;
        }
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=1600');background-size:cover;background-position:center;background-attachment:fixed;}
        nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
        .logo{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent-dark);letter-spacing:-0.5px;text-decoration:none}
        .logo span{color:var(--accent)}
        .nav-tabs{display:flex;gap:4px}
        .nav-tab{background:none;border:none;padding:6px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;color:var(--muted);transition:all .15s}
        .nav-tab:hover{background:var(--bg);color:var(--text)}
        .nav-tab.active{background:var(--accent-light);color:var(--accent-dark);font-weight:500}
        .nav-right{display:flex;gap:10px;align-items:center}
        #user-badge{font-size:13px;color:var(--muted);padding:4px 10px;background:var(--bg);border-radius:20px;border:1px solid var(--border)}
        .page{display:none;padding:2rem;max-width:900px;margin:0 auto}
        .page.active{display:block}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
        .form-group{margin-bottom:1rem}
        label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:var(--muted)}
        input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border .15s}
        input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
        textarea{resize:vertical;min-height:80px}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-primary:hover{background:var(--accent-dark)}
        .btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
        .btn-outline:hover{border-color:var(--accent);color:var(--accent)}
        .btn-danger{background:none;border:1px solid var(--danger);color:var(--danger)}
        .btn-danger:hover{background:#fdf0ee}
        .btn-sm{padding:5px 12px;font-size:13px}
        .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem}
        .alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:1rem;display:none}
        .alert.show{display:block}
        .alert-error{background:#fdf0ee;border:1px solid #f5c6c2;color:var(--danger)}
        .alert-success{background:#e8f5ee;border:1px solid #a8d5b9;color:var(--accent-dark)}
        .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
        .badge-faculty{background:#fef3e2;color:#8a5c00}
        .badge-student{background:#e8f5ee;color:var(--accent-dark)}
        .badge-admin{background:#ede8f5;color:#4a2d8a}
        .course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
        .course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
        .course-card:hover{border-color:var(--accent)}
        .course-card h3{font-family:'Playfair Display',serif;font-size:1rem;line-height:1.3}
        .course-card p{font-size:13px;color:var(--muted);flex:1}
        .teacher-tag{font-size:12px;color:var(--accent);font-weight:500}
        .auth-tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:1.5rem;width:fit-content}
        .auth-tab{padding:6px 18px;border-radius:6px;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted)}
        .auth-tab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
        .section-header h2{font-family:'Playfair Display',serif;font-size:1.3rem}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal{background:var(--surface);border-radius:12px;padding:2rem;width:min(420px,90vw);border:1px solid var(--border)}
        .modal h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:1rem}
        .empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
        .empty-icon{font-size:2.5rem;margin-bottom:.75rem;display:block}
        .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .profile-avatar{width:54px;height:54px;border-radius:50%;background:var(--accent-light);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent-dark);margin-bottom:1rem}
        .profile-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
        .profile-row:last-child{border-bottom:none}
        .profile-label{color:var(--muted)}
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">E<span>Gyan</span></a>
    <div class="nav-tabs" id="nav-tabs" style="display:none">
        <button class="nav-tab active" onclick="showPage('courses')">Courses</button>
        <button class="nav-tab" onclick="showPage('my-courses')">My Courses</button>
        <button class="nav-tab" onclick="showPage('profile')">Profile</button>
    </div>
    <div class="nav-right">
        <span id="user-badge" style="display:none"></span>
        <a href="/" id="back-home-btn" style="font-size:13px;color:var(--muted);text-decoration:none;padding:5px 12px;border:1px solid var(--border);border-radius:7px">← Home</a>
        <button class="btn btn-outline btn-sm" id="logout-btn" style="display:none" onclick="logout()">Log out</button>
    </div>
</nav>

<!-- AUTH PAGE -->
<div class="page active" id="page-auth">
    <div style="max-width:420px;margin:3rem auto;background:rgba(255,255,255,0.92);padding:2rem;border-radius:16px;backdrop-filter:blur(6px);">
        <div style="text-align:center;margin-bottom:2rem">
            <div style="font-family:'Playfair Display',serif;font-size:2rem;color:var(--accent-dark)">E<span style="color:var(--accent)">Gyan</span></div>
            <p style="color:var(--muted);font-size:14px;margin-top:6px">Your online learning platform</p>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">Log in</button>
            <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
        </div>
        <div id="alert-auth" class="alert"></div>
        <div id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@example.com"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••"/>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">
                <span id="login-btn-text">Log in</span>
            </button>
        </div>
        <div id="register-form" style="display:none">
            <div class="form-group">
                <label>Full name</label>
                <input type="text" id="reg-name" placeholder="Your name"/>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="you@example.com"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min. 6 characters"/>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="reg-role">
                    <option value="">Select role</option>
                    <option value="STUDENT">Student</option>
                    <option value="FACULTY">Faculty</option>
                </select>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="handleRegister()">
                <span id="reg-btn-text">Create account</span>
            </button>
        </div>
    </div>
</div>

<!-- COURSES PAGE -->
<div class="page" id="page-courses">
    <div class="section-header">
        <h2>All Courses</h2>
        <button class="btn btn-primary btn-sm" id="create-course-btn" style="display:none" onclick="openCreateModal()">+ New Course</button>
    </div>
    <div id="alert-courses" class="alert"></div>
    <div class="course-grid" id="courses-grid">
        <div class="empty"><span class="empty-icon">📚</span>Loading courses…</div>
    </div>
</div>

<!-- MY COURSES PAGE -->
<div class="page" id="page-my-courses">
    <div class="section-header"><h2 id="my-courses-heading">My Courses</h2></div>
    <div id="alert-my" class="alert"></div>
    <div class="course-grid" id="my-courses-grid">
        <div class="empty"><span class="empty-icon">📂</span>Loading…</div>
    </div>
</div>

<!-- PROFILE PAGE -->
<div class="page" id="page-profile">
    <div class="section-header"><h2>My Profile</h2></div>
    <div class="card" style="max-width:480px" id="profile-card"></div>
</div>

<!-- CREATE COURSE MODAL -->
<div class="modal-overlay" id="create-modal">
    <div class="modal">
        <h3>Create New Course</h3>
        <div id="alert-create" class="alert"></div>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="course-title" placeholder="Course title"/>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="course-desc" placeholder="What will students learn?"></textarea>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" id="create-course-submit" onclick="handleCreateCourse()">Create Course</button>
            <button class="btn btn-outline" onclick="closeCreateModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- ENROLL MODAL -->
<div class="modal-overlay" id="enroll-modal">
    <div class="modal">
        <h3 id="enroll-modal-title">Enroll in Course</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:1.25rem">You will be enrolled as a student in this course.</p>
        <div id="alert-enroll" class="alert"></div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="handleEnroll()">Confirm Enroll</button>
            <button class="btn btn-outline" onclick="closeEnrollModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- COURSE DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
    <div class="modal" style="width:min(600px,95vw);max-height:85vh;overflow-y:auto">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem">
            <h3 id="detail-title" style="font-family:'Playfair Display',serif;font-size:1.2rem"></h3>
            <button onclick="closeDetailModal()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)">✕</button>
        </div>
        <p id="detail-desc" style="font-size:14px;color:var(--muted);margin-bottom:0.5rem"></p>
        <p id="detail-teacher" style="font-size:13px;margin-bottom:1.5rem"></p>
        <div style="border-top:1px solid var(--border);padding-top:1rem">
            <p style="font-size:13px;font-weight:500;margin-bottom:0.75rem">Course Materials</p>
            <div id="detail-materials">
                <div class="empty" style="padding:1.5rem">
                    <span class="empty-icon" style="font-size:1.5rem">📭</span>
                    No materials uploaded yet.
                </div>
            </div>
        </div>
        <div id="detail-upload-section" style="display:none;border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem">
            <p style="font-size:13px;font-weight:500;margin-bottom:0.75rem">➕ Upload New Material</p>
            <div id="alert-detail-upload" class="alert"></div>
            <div class="form-group">
                <label>Material Title</label>
                <input type="text" id="detail-material-title" placeholder="e.g. Introduction Video"/>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="detail-material-type">
                    <option value="VIDEO">Video</option>
                    <option value="DOCUMENT">Document</option>
                </select>
            </div>
            <div class="form-group">
                <label>File</label>
                <input type="file" id="detail-material-file" accept="video/*,.pdf,.doc,.docx,.ppt,.pptx"/>
            </div>
            <button class="btn btn-outline btn-sm" onclick="handleDetailUpload()">+ Upload</button>
        </div>
        <div id="detail-students-section" style="display:none;border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem">
            <p style="font-size:13px;font-weight:500;margin-bottom:0.75rem">Enrolled Students</p>
            <div id="detail-students"></div>
        </div>
        <div id="detail-delete-section" style="display:none;border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem">
            <button class="btn btn-danger btn-sm" onclick="handleDeleteCourse()">🗑 Delete this Course</button>
        </div>
    </div>
</div>

<script>
    const BASE = 'http://localhost:8080';
    let currentUser = null;
    let enrollTargetId = null;
    let detailCourseId = null;

    function showAlert(id, msg, type='error'){
        const el = document.getElementById(id);
        if(!el) return;
        el.className = `alert alert-${type} show`;
        el.textContent = msg;
        if(type==='success') setTimeout(()=>el.classList.remove('show'), 3000);
    }
    function hideAlert(id){
        const el = document.getElementById(id);
        if(el) el.classList.remove('show');
    }

    async function api(method, path, body){
        const opts = { method, headers: body ? {'Content-Type':'application/json'} : {} };
        if(body) opts.body = JSON.stringify(body);
        const res = await fetch(BASE+path, opts);
        if(!res.ok){
            const data = await res.json().catch(()=>({}));
            throw new Error(data.error || `Error ${res.status}`);
        }
        const ct = res.headers.get('content-type')||'';
        return ct.includes('json') ? res.json() : null;
    }

    function roleBadge(role){
        const r = (role||'').toUpperCase();
        const cls = r==='FACULTY'?'faculty':r==='ADMIN'?'admin':'student';
        return `<span class="badge badge-${cls}">${r}</span>`;
    }
    function initials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
    function escape(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function formatSize(bytes){
        if(!bytes) return '';
        if(bytes < 1024*1024) return (bytes/1024).toFixed(1)+' KB';
        return (bytes/(1024*1024)).toFixed(1)+' MB';
    }

    function switchAuthTab(tab){
        document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('login-form').style.display = tab==='login'?'block':'none';
        document.getElementById('register-form').style.display = tab==='register'?'block':'none';
        hideAlert('alert-auth');
    }

    async function handleLogin(){
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if(!email||!password){ showAlert('alert-auth','Please fill all fields'); return; }
        const btn = document.getElementById('login-btn-text');
        btn.innerHTML = '<span class="spin"></span>';
        try{
            const user = await api('POST','/users/login',{email,password});
            setUser(user);
        } catch(e){ showAlert('alert-auth', e.message||'Login failed'); }
        btn.textContent = 'Log in';
    }

    async function handleRegister(){
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const role = document.getElementById('reg-role').value;
        if(!name||!email||!password||!role){ showAlert('alert-auth','All fields are required'); return; }
        const btn = document.getElementById('reg-btn-text');
        btn.innerHTML = '<span class="spin"></span>';
        try{
            await api('POST','/users',{name,email,password,role});
            showAlert('alert-auth','Account created! You can now log in.','success');
            document.querySelector('.auth-tab').click();
        } catch(e){
            const msg = e.message.includes('409') || e.message.toLowerCase().includes('conflict')
                ? 'This email is already registered. Please log in instead.'
                : (e.message || 'Registration failed');
            showAlert('alert-auth', msg);
        }
        btn.textContent = 'Create account';
    }

    function setUser(user){
        currentUser = user;
        document.getElementById('page-auth').classList.remove('active');
        document.getElementById('nav-tabs').style.display = 'flex';
        document.getElementById('user-badge').style.display = 'inline-block';
        document.getElementById('user-badge').textContent = user.name + ' · ' + user.role;
        document.getElementById('logout-btn').style.display = 'inline-flex';
        document.getElementById('back-home-btn').style.display = 'none';
        if(user.role==='FACULTY') document.getElementById('create-course-btn').style.display = 'inline-flex';
        buildProfile();
        showPage('courses');
    }

    function logout(){
        currentUser = null;
        document.getElementById('nav-tabs').style.display = 'none';
        document.getElementById('user-badge').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'none';
        document.getElementById('back-home-btn').style.display = 'inline-block';
        document.getElementById('create-course-btn').style.display = 'none';
        showPageEl('page-auth');
    }

    function showPage(name){
        document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
        const map = {courses:0,'my-courses':1,profile:2};
        document.querySelectorAll('.nav-tab')[map[name]]?.classList.add('active');
        showPageEl('page-'+name);
        if(name==='courses') loadCourses();
        if(name==='my-courses') loadMyCourses();
    }
    function showPageEl(id){
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById(id)?.classList.add('active');
    }

    async function loadCourses(){
        const grid = document.getElementById('courses-grid');
        grid.innerHTML = '<div class="empty"><span class="empty-icon">📚</span>Loading…</div>';
        try{
            const courses = await api('GET','/courses');
            if(!courses.length){ grid.innerHTML='<div class="empty"><span class="empty-icon">📭</span>No courses yet.</div>'; return; }
            grid.innerHTML = courses.map(c=>courseCardHTML(c)).join('');
        } catch(e){ showAlert('alert-courses','Could not load courses: '+e.message); }
    }

    function courseCardHTML(c, enrolled=false){
        const teacherName = c.teacher ? c.teacher.name : 'Unknown';
        const studentCount = c.students ? c.students.length : 0;
        const isEnrolled = enrolled || (c.students && c.students.some(s => s.id === currentUser?.id));
        const canEnroll = currentUser?.role==='STUDENT' && !isEnrolled;
        const isTeacher = currentUser?.role==='FACULTY' && c.teacher?.id === currentUser?.id;
        return `<div class="course-card">
            <h3>${escape(c.title)}</h3>
            <p>${escape(c.description||'No description')}</p>
            <div class="teacher-tag">👤 ${escape(teacherName)}</div>
            <div style="font-size:12px;color:var(--muted)">${studentCount} student${studentCount!==1?'s':''}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
                <button class="btn btn-outline btn-sm" onclick="openDetailModal(${c.id})">👁 View Content</button>
                ${canEnroll ? `<button class="btn btn-primary btn-sm" onclick="openEnrollModal(${c.id},'${escape(c.title)}')">Enroll</button>` : ''}
                ${isEnrolled ? `<span style="font-size:12px;color:var(--accent);font-weight:500;align-self:center">✓ Enrolled</span>` : ''}
                ${isTeacher ? `<button class="btn btn-danger btn-sm" onclick="openDetailModal(${c.id})">Manage</button>` : ''}
            </div>
        </div>`;
    }

    async function loadMyCourses(){
        const grid = document.getElementById('my-courses-grid');
        const heading = document.getElementById('my-courses-heading');
        grid.innerHTML = '<div class="empty"><span class="empty-icon">📂</span>Loading…</div>';
        try{
            let courses;
            if(currentUser.role==='FACULTY'){
                heading.textContent = 'Courses I Teach';
                courses = await api('GET',`/courses/teacher/${currentUser.id}`);
            } else {
                heading.textContent = "Courses I'm Enrolled In";
                courses = await api('GET',`/courses/student/${currentUser.id}`);
            }
            if(!courses.length){ grid.innerHTML='<div class="empty"><span class="empty-icon">📂</span>Nothing here yet.</div>'; return; }
            grid.innerHTML = courses.map(c=>courseCardHTML(c, currentUser.role==='STUDENT')).join('');
        } catch(e){ showAlert('alert-my','Could not load your courses: '+e.message); }
    }

    async function openDetailModal(courseId){
        detailCourseId = courseId;
        document.getElementById('detail-modal').classList.add('open');
        document.getElementById('detail-title').textContent = 'Loading…';
        document.getElementById('detail-desc').textContent = '';
        document.getElementById('detail-teacher').innerHTML = '';
        document.getElementById('detail-materials').innerHTML = '<p style="font-size:13px;color:var(--muted)">Loading…</p>';
        document.getElementById('detail-students').innerHTML = '';
        document.getElementById('detail-students-section').style.display = 'none';
        document.getElementById('detail-delete-section').style.display = 'none';
        document.getElementById('detail-upload-section').style.display = 'none';
        hideAlert('alert-detail-upload');
        try{
            const courses = await api('GET', '/courses');
            const course = courses.find(c => c.id === courseId);
            if(course){
                document.getElementById('detail-title').textContent = course.title;
                document.getElementById('detail-desc').textContent = course.description || '';
                document.getElementById('detail-teacher').innerHTML = `👤 <strong>${escape(course.teacher?.name||'')}</strong>`;
                const isTeacher = currentUser?.role==='FACULTY' && course.teacher?.id === currentUser?.id;
                if(isTeacher){
                    document.getElementById('detail-upload-section').style.display = 'block';
                    document.getElementById('detail-students-section').style.display = 'block';
                    document.getElementById('detail-delete-section').style.display = 'block';
                    const students = course.students || [];
                    document.getElementById('detail-students').innerHTML = students.length
                        ? students.map(s=>`<div style="font-size:13px;padding:6px 0;border-bottom:1px solid var(--border)">
                            👤 ${escape(s.name)} <span style="color:var(--muted)">${escape(s.email)}</span>
                          </div>`).join('')
                        : '<p style="font-size:13px;color:var(--muted)">No students enrolled yet.</p>';
                }
            }
            const materials = await api('GET', `/materials/${courseId}`);
            if(!materials || !materials.length){
                document.getElementById('detail-materials').innerHTML = `
                    <div class="empty" style="padding:1.5rem">
                        <span class="empty-icon" style="font-size:1.5rem">📭</span>
                        No materials uploaded yet.
                    </div>`;
            } else {
                document.getElementById('detail-materials').innerHTML = materials.map(m=>`
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
                        <div>
                            <span style="font-size:13px;font-weight:500">${m.fileType==='VIDEO'?'🎬':'📄'} ${escape(m.title)}</span>
                            <div style="font-size:12px;color:var(--muted)">${escape(m.fileName)} · ${formatSize(m.fileSize)}</div>
                        </div>
                        <a href="${BASE}/materials/download/${m.id}"
                           style="font-size:12px;color:var(--accent);text-decoration:none;font-weight:500">
                            ⬇ Download
                        </a>
                    </div>`).join('');
            }
        } catch(e){
            document.getElementById('detail-materials').innerHTML =
                `<p style="font-size:13px;color:var(--danger)">Could not load: ${e.message}</p>`;
        }
    }

    function closeDetailModal(){
        document.getElementById('detail-modal').classList.remove('open');
        detailCourseId = null;
        document.getElementById('detail-material-title').value = '';
        document.getElementById('detail-material-file').value = '';
        hideAlert('alert-detail-upload');
    }

    async function handleDetailUpload(){
        const title = document.getElementById('detail-material-title').value.trim();
        const fileType = document.getElementById('detail-material-type').value;
        const file = document.getElementById('detail-material-file').files[0];
        if(!title){ showAlert('alert-detail-upload','Material title is required'); return; }
        if(!file){ showAlert('alert-detail-upload','Please select a file'); return; }
        if(!detailCourseId){ showAlert('alert-detail-upload','No course selected'); return; }
        const formData = new FormData();
        formData.append('file', file);
        formData.append('title', title);
        formData.append('fileType', fileType);
        try{
            const res = await fetch(`${BASE}/materials/${detailCourseId}`, { method: 'POST', body: formData });
            if(!res.ok){ const text = await res.text(); throw new Error(text || 'Upload failed'); }
            showAlert('alert-detail-upload','Uploaded successfully!','success');
            document.getElementById('detail-material-title').value = '';
            document.getElementById('detail-material-file').value = '';
            await openDetailModal(detailCourseId);
        } catch(e){ showAlert('alert-detail-upload','Upload failed: '+e.message); }
    }

    async function handleDeleteCourse(){
        if(!confirm('Are you sure you want to delete this course?')) return;
        try{
            await api('DELETE', `/courses/${detailCourseId}/teacher/${currentUser.id}`);
            closeDetailModal();
            loadCourses();
            showAlert('alert-courses','Course deleted.','success');
        } catch(e){ alert('Could not delete: '+e.message); }
    }

    function openCreateModal(){ document.getElementById('create-modal').classList.add('open'); }
    function closeCreateModal(){
        document.getElementById('create-modal').classList.remove('open');
        document.getElementById('course-title').value='';
        document.getElementById('course-desc').value='';
        hideAlert('alert-create');
    }

    async function handleCreateCourse(){
        const title = document.getElementById('course-title').value.trim();
        const description = document.getElementById('course-desc').value.trim();
        if(!title){ showAlert('alert-create','Title is required'); return; }
        try{
            await api('POST',`/courses/${currentUser.id}`,{title,description});
            closeCreateModal();
            loadCourses();
            showAlert('alert-courses','Course created! Click "Manage" to upload materials.','success');
        } catch(e){ showAlert('alert-create','Could not create course: '+e.message); }
    }

    function openEnrollModal(courseId, title){
        enrollTargetId = courseId;
        document.getElementById('enroll-modal-title').textContent = 'Enroll in: '+title;
        document.getElementById('enroll-modal').classList.add('open');
    }
    function closeEnrollModal(){
        enrollTargetId = null;
        document.getElementById('enroll-modal').classList.remove('open');
        hideAlert('alert-enroll');
    }
    async function handleEnroll(){
        try{
            await api('PUT',`/courses/${enrollTargetId}/enroll/${currentUser.id}`);
            closeEnrollModal();
            loadCourses();
            showAlert('alert-courses','Successfully enrolled!','success');
        } catch(e){ showAlert('alert-enroll','Enrollment failed: '+e.message); }
    }

    function buildProfile(){
        const u = currentUser;
        document.getElementById('profile-card').innerHTML = `
            <div class="profile-avatar">${initials(u.name)}</div>
            <div class="profile-row"><span class="profile-label">Name</span><span>${escape(u.name)}</span></div>
            <div class="profile-row"><span class="profile-label">Email</span><span>${escape(u.email)}</span></div>
            <div class="profile-row"><span class="profile-label">Role</span><span>${roleBadge(u.role)}</span></div>
            <div class="profile-row"><span class="profile-label">ID</span><span style="color:var(--muted);font-size:13px">#${u.id}</span></div>
        `;
    }

    document.querySelectorAll('.modal-overlay').forEach(el=>{
        el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); });
    });
</script>
</body>
</html>
